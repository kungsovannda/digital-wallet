services:
  # Axon Server (Local Testing & Routing)
  dw-axonserver:
    image: axoniq/axonserver
    hostname: axonserver
    container_name: dw-axonserver
    volumes:
      - axonserver-data:/axonserver/data
      - axonserver-events:/axonserver/events
      - axonserver-log:/axonserver/log
    ports:
      - '8024:8024'
      - '8124:8124'
    networks:
      - dw-net

  # PostgreSQL - Event Store & Identity Databases
  dw-postgres:
    image: postgres:17.5-bullseye
    container_name: dw-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post
    ports:
      - "5999:5432"
    volumes:
      - dw_postgres_vol:/var/lib/postgresql/data
    networks:
      - dw-net

  dw-identity:
    image: postgres:17.5-bullseye
    container_name: dw-identity
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post
    ports:
      - "5998:5432"
    volumes:
      - dw_identity_vol:/var/lib/postgresql/data
    networks:
      - dw-net

  dw-notification:
    image: postgres:17.5-bullseye
    container_name: dw-notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post
    ports:
      - "5997:5432"
    volumes:
      - dw_notification_vol:/var/lib/postgresql/data
    networks:
      - dw-net

  # Kafka - Distributed Event Bus (Kraft Mode)
  kafka-1-dw:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-1-dw
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1-dw:9091,2@kafka-2-dw:9091,3@kafka-3-dw:9091'
      KAFKA_LISTENERS: 'PLAINTEXT://:9090,CONTROLLER://kafka-1-dw:9091,EXTERNAL://:9092'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1-dw:9090,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    volumes:
      - kafka_1_dw_vol:/var/lib/kafka/data
    networks:
      - dw-net

  kafka-2-dw:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-2-dw
    ports:
      - "29094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1-dw:9091,2@kafka-2-dw:9091,3@kafka-3-dw:9091'
      KAFKA_LISTENERS: 'PLAINTEXT://:9090,CONTROLLER://kafka-2-dw:9091,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2-dw:9090,EXTERNAL://localhost:29094
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    volumes:
      - kafka_2_dw_vol:/var/lib/kafka/data
    networks:
      - dw-net

  kafka-3-dw:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-3-dw
    ports:
      - "29096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1-dw:9091,2@kafka-2-dw:9091,3@kafka-3-dw:9091'
      KAFKA_LISTENERS: 'PLAINTEXT://:9090,CONTROLLER://kafka-3-dw:9091,EXTERNAL://:9096'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3-dw:9090,EXTERNAL://localhost:29096
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    volumes:
      - kafka_3_dw_vol:/var/lib/kafka/data
    networks:
      - dw-net

  # Kafka UI
  kafka-ui-dw:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-dw
    ports:
      - "18000:8080"
    environment:
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: qwer
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1-dw:9090,kafka-2-dw:9090,kafka-3-dw:9090"
    volumes:
      - kafka-ui-dw-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - kafka-1-dw
      - kafka-2-dw
      - kafka-3-dw
    networks:
      - dw-net

  # MongoDB - Read Model Storage
  dw-mongodb:
    image: "mongodb/mongodb-community-server:latest"
    container_name: "mongodb-latest"
    ports:
      - "27168:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=qwer
    volumes:
      - mongodb_latest_data_vol:/data/db/
      - mongodb_latest_log_vol:/var/log/mongodb/
    networks:
      - dw-net

volumes:
  axonserver-data:
  axonserver-events:
  axonserver-log:
  dw_postgres_vol:
  dw_identity_vol:
  dw_notification_vol:
  kafka_1_dw_vol:
  kafka_2_dw_vol:
  kafka_3_dw_vol:
  kafka-ui-dw-data:
  mongodb_latest_data_vol:
  mongodb_latest_log_vol:

networks:
  dw-net:
    driver: bridge
