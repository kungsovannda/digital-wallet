spring:
  application:
    name: wallet-command

  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: post
    url: jdbc:postgresql://localhost:5999/postgres
  jpa:
    hibernate:
      ddl-auto: update

axon:
  axonserver:
    enabled: false

  kafka:
    bootstrap-servers:
      - localhost:29092
      - localhost:29094
      - localhost:29096
    default-topic: local.event
    producer:
      retries: 0
      event-processor-mode: subscribing
    fetcher:
      poll-timeout: 3000
    consumer:
      enable-auto-commit: true
      auto-commit-interval: 3000
      event-processor-mode: tracking

  serializer:
    general: jackson3
    events: jackson3
    messages: jackson3

server:
  port: 8081

